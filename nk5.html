<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>College Study Material Portal</title>

  <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#f1f5f9;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:40px;
    color:#2563eb;
    font-size:65px;
    font-weight:bold;
    line-height:1.1;
}

.container{
    max-width:800px;
    margin:0 auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    margin-bottom:30px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.pdf-box{
    background:#f9fafb;
    border:1px solid #d1d5db;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.pdf-box:last-child{
    margin-bottom:0;
}

.pdf-title{
    font-size:24px;
    font-weight:bold;
    color:#374151;
    margin-bottom:15px;
}

.btn{
    display:inline-block;
    background:#2563eb;
    color:white;
    text-decoration:none;
    padding:14px 25px;
    border-radius:12px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.admin{
    margin-top:40px;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.admin h2{
    color:#dc2626;
    margin-bottom:15px;
}

.code-box{
    background:#111827;
    color:white;
    padding:15px;
    border-radius:10px;
    overflow:auto;
    margin-top:10px;
}

/* Mobile Responsive */

@media (max-width:768px){

    body{
        padding:15px;
    }

    h1{
        font-size:32px;
        margin-bottom:30px;
    }

    .card{
        padding:20px;
        border-radius:18px;
    }

    .pdf-title{
        font-size:20px;
    }

    .btn{
        font-size:16px;
        padding:12px 22px;
    }
}

  </style>
</head>

<body>

  <h1>College Study Material Portal</h1>

  <div class="container">

    <!-- CSE -->
    <div class="card">

      <div class="pdf-box">
        <div class="pdf-title">Applied Physics-B</div>
        <a class="btn" href="https://drive.google.com/file/d/1_K-QLK9xVU-_i9PjX5FhyJfX7honVDK2/view?usp=drivesdk" target="_blank">
          Open PDF
        </a>
      </div>
    </div>

    <div class="card">

      <div class="pdf-box">
        <div class="pdf-title">FIT Notes</div>
        <a class="btn" href="https://drive.google.com/file/d/1ChUPk47m6rwkU50btlz_QU4Dxr9GNd0F/view?usp=drivesdk" target="_blank">
          Open PDF
        </a>
      </div>
    </div>

    <div class="card">

      <div class="pdf-box">
        <div class="pdf-title">FEEE Notes</div>
        <a class="btn" href="https://drive.google.com/file/d/1RaJ74_wGAjqVvetq7F5dygafgjRIjOSX/view?usp=drivesdk" target="_blank">
          Open PDF
        </a>
      </div>
    </div>

    <div class="card">

      <div class="pdf-box">
        <div class="pdf-title">Basic Engineering Mathematics</div>
        <a class="btn" href="https://www.orimi.com/pdf-test.pdf" target="_blank">
          Open PDF
        </a>
      </div>
    </div>

  </div>

</body>
</html>
